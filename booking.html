<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوفينغ هومز | الحجوزات</title>
    <link rel="stylesheet" href="css/external.css">
    <link rel="stylesheet" href="css/normalize.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="search-action-section">
                <input type="text" placeholder="بحث" class="search-input">
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الصفحة الرئيسية</a></li>
                    <li><a href="services.html">الخدمات</a></li>
                    <li><a href="facilities.html">المرافق</a></li>
                    <li><a href="packages.html">الحزم</a></li>
                    <li><a href="booking.html" class="active">الحجوزات</a></li>
                    <li><a href="contact us.html">اتصل بنا</a></li>
                    <li><a href="about .html">نبذة بنا</a></li>
                </ul>
            </nav>

            <div class="logo-section">
                <a href="index.html">
                    <img src="logo.png" alt="Loving Home" class="site-logo">
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="booking-form-container">
            <h2 style="text-align: center; margin-bottom: 30px;">طلب الحجز </h2>
            
            <form class="booking-form">
                <div class="form-group">
                    <label>اسم صاحب الحيوان:</label>
                    <input type="text" placeholder="أدخل اسمك الكامل" required>
                </div>

                <div class="form-group">
                    <label>اسم الكلب:</label>
                    <input type="text" placeholder="ما اسم حيوانك الاليف" required>
                </div>

                <div class="form-group">
                    <label> ادخل رقم الهاتف:</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>نوع الخدمة:</label>
                    <select>
                        <option value="classic"> اقامة فندقية</option>
                        <option value="premium">تدريب وتأهيل </option>
                        <option value="daycare"> العنايةوالمظهر</option>
                        <option value="daycare"> المتابعة الصحية </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>نوع المرفق:</label>
                    <select>
                        <option value="classic"> صالة للحلاقة ومنتجع</option>
                        <option value="premium"> غرف مزودة بتدفئة/ تبريد تحت الارضية والتلفزيون</option>
                        <option value="daycare"> خدمة التوصيل "من والى المكان"</option>
                        <option value="daycare"> مراعي خارجية امنة</option>
                        <option value="daycare"> 24 ساعةخدمات بيطرية متاحة على مدار</option>
                        <option value="daycare"> مرافق اخرى (مراقبة الحيوانات الاليفة، التمشية في الغابات، مساحة عشب خاصة، حظيرة لعب داخلية)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>نوع الحزمة:</label>
                    <select>
                        <option value="classic">الحزمة الكلاسيكية</option>
                        <option value="premium">الحزمة المميزة</option>
                        <option value="daycare">الحزمة اليومية</option>
                        <option value="daycare">حزمة مخصصة </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ملاحظات إضافية (حساسية، علاجات، او الاشياء التي تريدها في الحزم المخصصة):</label>
                    <textarea placeholder="اكتب أي معلومات تهمنا عن حيوانك الاليف..."></textarea>
                </div>

                <button type="submit" class="btn-orange submit-btn">إرسال طلب الحجز</button>
            </form>
        </div>
    </main>

</body>
</html>
